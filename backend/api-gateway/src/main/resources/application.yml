spring:
  application:
    name: api-gateway

  main:
    web-application-type: reactive

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

      routes:
        # ========================================
        # BLOCK INTERNAL ROUTES
        # Must be FIRST to take priority
        # ========================================

        # Block User Service internal routes
        - id: block-user-internal
          uri: no://op
          predicates:
            - Path=/api/users/internal/**
          filters:
            - name: SetStatus
              args:
                status: 403

        # Block Auth Service internal routes (if any)
        - id: block-auth-internal
          uri: no://op
          predicates:
            - Path=/api/auth/internal/**
          filters:
            - name: SetStatus
              args:
                status: 403

        # ========================================
        # AUTH SERVICE - Public Routes
        # ========================================

        - id: auth-register
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/register
            - Method=POST

        - id: auth-login
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/login
            - Method=POST

        - id: auth-forgot-password
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/forgot-password
            - Method=POST

        - id: auth-reset-password
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/reset-password
            - Method=POST

        # ========================================
        # AUTH SERVICE - Protected Routes
        # ========================================

        - id: auth-refresh-token
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/refresh-token
            - Method=POST
          filters:
            - AuthenticationFilter

        - id: auth-logout
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/logout
            - Method=POST
          filters:
            - AuthenticationFilter

        # ========================================
        # USER SERVICE - All Routes (Protected)
        # ========================================

        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/users/**
          filters:
            - AuthenticationFilter

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true








# Server
server:
  port: ${PORT:8080}

# JWT
jwt:
  secret: ${JWT_SECRET:mySecretKeyForJWTTokenGenerationWhichShouldBeLongEnoughAndSecure}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    com.ecommerce.apigateway: DEBUG
    org.springframework.cloud.gateway: INFO