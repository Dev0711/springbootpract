spring:
  application:
    name: api-gateway

  main:
    web-application-type: reactive

  cloud:
    gateway:
      # CORS Configuration
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

      # Routes
      routes:
        # Block internal APIs
        - id: block-internal
          uri: no://op
          predicates:
            - Path=/**/internal/**
          filters:
            - name: SetStatus
              args:
                status: 403

        # Auth - Public Routes
        - id: auth-register
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/register
            - Method=POST

        - id: auth-login
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/login
            - Method=POST

        - id: auth-forgot-password
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/forgot-password
            - Method=POST

        - id: auth-reset-password
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/reset-password
            - Method=POST

        # Auth - Protected Routes
        - id: auth-refresh-token
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/refresh-token
            - Method=POST
          filters:
            - AuthenticationFilter

        - id: auth-logout
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/logout
            - Method=POST
          filters:
            - AuthenticationFilter

        # User Service - All Routes (Protected)
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/users/**
          filters:
            - AuthenticationFilter

# Server
server:
  port: ${PORT:8080}

# JWT
jwt:
  secret: ${JWT_SECRET:mySecretKeyForJWTTokenGenerationWhichShouldBeLongEnoughAndSecure}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    com.ecommerce.apigateway: DEBUG
    org.springframework.cloud.gateway: INFO