version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ecom-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecom-network

  api-gateway:
    build:
      context: ./api-gateway
    container_name: ecom-api-gateway
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - AUTH_SERVICE_URL=http://auth-service:8081
      - USER_SERVICE_URL=http://user-service:8082
      - JWT_SECRET=df0f81d1e4c7e8e5e8e88e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e
    depends_on:
      - auth-service
      - user-service
    networks:
      - ecom-network

  auth-service:
    build:
      context: ./auth-service
    container_name: ecom-auth-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/ecom_auth
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=root
      - USER_SERVICE_URL=http://user-service:8082
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecom-network

  user-service:
    build:
      context: ./user-service
    container_name: ecom-user-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/userdb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecom-network

networks:
  ecom-network:
    driver: bridge

volumes:
  postgres-data:
